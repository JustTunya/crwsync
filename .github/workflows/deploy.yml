name: 🔗 CRWSYNC deployment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options: [ staging, production ]

concurrency:
  group: 'crwsync-${{ github.ref }}'
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  deployments: write

jobs:
  test:
    name: 🧪 Lint, Test & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps & run tests
        working-directory: ./apps/frontend
        run: |
          npm ci
          npm run lint

      - name: Lint frontend Dockerfiles
        uses: hadolint/hadolint-action@master
        with:
          dockerfile: apps/frontend/Dockerfile

      - name: Lint backend Dockerfiles
        uses: hadolint/hadolint-action@master
        with:
          dockerfile: apps/backend/Dockerfile

      - name: Scan images for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

  build:
    name: 🛠️ Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU & Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate repository path
        run: echo "REPOSITORY=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build & Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new
          tags: ghcr.io/${{ env.REPOSITORY }}/frontend:${{ github.sha }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new
          tags: ghcr.io/${{ env.REPOSITORY }}/backend:${{ github.sha }}

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    name: 🚀 Deploy to ${{ github.event.inputs.environment }}
    runs-on: [ self-hosted, linux, x64 ]
    needs: build
    environment: ${{ github.event.inputs.environment }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Determine Swarm state
        id: swarm
        run: |
          echo "state=$(docker info --format '{{.Swarm.LocalNodeState}}')" >> $GITHUB_OUTPUT

      - name: Init Swarm if needed
        if: steps.swarm.outputs.state != 'active'
        run: docker swarm init --advertise-addr 127.0.0.1

      - name: Pull images (warm)
        run: |
          docker pull ghcr.io/${{ env.REPOSITORY }}/frontend:${{ github.sha }} || true
          docker pull ghcr.io/${{ env.REPOSITORY }}/backend:${{ github.sha }} || true

      - name: Deploy stack
        run: |
          docker stack deploy --with-registry-auth -c stack.yml crwsync-${{ github.event.inputs.environment }}

      - name: Verify services
        run: docker service ls