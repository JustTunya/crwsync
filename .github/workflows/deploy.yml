name: 🔗 CRWSYNC deployment

on:
  push:
    branches: [main]

concurrency:
  group: 'crwsync'
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  deployments: write

jobs:
  test:
    name: 🧪 Lint, Test & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps & run tests
        working-directory: ./apps/frontend
        run: |
          npm ci
          npm run lint

      - name: Lint frontend Dockerfiles
        uses: hadolint/hadolint-action@master
        with:
          dockerfile: apps/frontend/Dockerfile

      - name: Lint backend Dockerfiles
        uses: hadolint/hadolint-action@master
        with:
          dockerfile: apps/backend/Dockerfile

      - name: Scan images for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          skip-dirs: |
            node_modules
            apps/frontend/.next

  build:
    name: 🛠️ Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
              - 'packages/types/**'
              - 'package-lock.json'
              - 'tsconfig*.json'
            backend:
              - 'apps/backend/**'
              - 'packages/types/**'
              - 'package-lock.json'
              - 'tsconfig*.json'

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ secrets.GH_REPO }}/frontend:${{ github.sha }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ secrets.GH_REPO }}/backend:${{ github.sha }}

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    name: 🚀 Deploy CRWSYNC stack
    runs-on: [ self-hosted, linux, x64 ]
    needs: build
    timeout-minutes: 10
    env:
      FRONTEND_IMAGE: ghcr.io/${{ secrets.GH_REPO }}/frontend:${{ github.sha }}
      BACKEND_IMAGE: ghcr.io/${{ secrets.GH_REPO }}/backend:${{ github.sha }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}
      DB_NAME: ${{ secrets.DB_NAME }}
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      MAIL_PORT: ${{ secrets.MAIL_PORT }}
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_PASS: ${{ secrets.MAIL_PASS }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine Swarm state
        id: swarm
        run: |
          echo "state=$(docker info --format '{{.Swarm.LocalNodeState}}')" >> $GITHUB_OUTPUT

      - name: Init Swarm if needed
        if: steps.swarm.outputs.state != 'active'
        run: docker swarm init --advertise-addr 127.0.0.1

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images (warm)
        run: |
          docker pull ${FRONTEND_IMAGE} || true
          docker pull ${BACKEND_IMAGE} || true

      - name: Remove old stack if exists
        run: docker stack rm crwsync || true

      - name: Ensure network exists
        run: |
          docker network inspect crwsync_net >/dev/null 2>&1 || \
          docker network create --driver overlay --attachable crwsync_net

      - name: Deploy stack
        run: |
          docker stack deploy --with-registry-auth --detach=false -c stack.yml crwsync

      - name: Verify services
        run: docker service ls