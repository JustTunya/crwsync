name: CRWSYNC deployment

on:
  push:
    branches: [main]

concurrency:
  group: 'crwsync'
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  deployments: write

jobs:
  test:
    name: 🧪 Lint, Test & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build common package
        run: pnpm run build --filter="@crwsync/types" --filter="@crwsync/styles"

      - name: Lint project
        run: pnpm run lint

      - name: Test project
        run: pnpm run test

      - name: Lint web (frontend) Dockerfiles
        uses: hadolint/hadolint-action@master
        with:
          dockerfile: apps/frontend/web/Dockerfile

      - name: Lint dash (frontend) Dockerfiles
        uses: hadolint/hadolint-action@master
        with:
          dockerfile: apps/frontend/dash/Dockerfile

      - name: Lint backend Dockerfiles
        uses: hadolint/hadolint-action@master
        with:
          dockerfile: apps/backend/Dockerfile

      - name: Scan images for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

  build:
    name: 🛠️ Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU & Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Web
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/frontend/web/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_DASH_URL=${{ secrets.NEXT_PUBLIC_DASH_URL }}
          tags: ghcr.io/${{ secrets.GH_REPO }}/web:${{ github.sha }}

      - name: Build & Push Dash
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/frontend/dash/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WEB_URL=${{ secrets.NEXT_PUBLIC_WEB_URL }}
          tags: ghcr.io/${{ secrets.GH_REPO }}/dash:${{ github.sha }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new
          tags: ghcr.io/${{ secrets.GH_REPO }}/backend:${{ github.sha }}

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    name: 🚀 Deploy CRWSYNC stack
    runs-on: [ self-hosted, linux, x64 ]
    needs: build
    timeout-minutes: 10
    env:
      WEB_IMAGE: ghcr.io/${{ secrets.GH_REPO }}/web:${{ github.sha }}
      DASH_IMAGE: ghcr.io/${{ secrets.GH_REPO }}/dash:${{ github.sha }}
      BACKEND_IMAGE: ghcr.io/${{ secrets.GH_REPO }}/backend:${{ github.sha }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
      NEXT_PUBLIC_DASH_URL: ${{ secrets.NEXT_PUBLIC_DASH_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PRISMA_LOG_QUERY: ${{ secrets.PRISMA_LOG_QUERY }}
      REDIS_PASS: ${{ secrets.REDIS_PASS }}
      REDIS_KEY_PREFIX: ${{ secrets.REDIS_KEY_PREFIX }}
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      MAIL_PORT: ${{ secrets.MAIL_PORT }}
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_PASS: ${{ secrets.MAIL_PASS }}
      JWT_ACCESS_TOKEN_SECRET: ${{ secrets.JWT_ACCESS_TOKEN_SECRET }}
      JWT_ACCESS_TOKEN_EXPIRATION: ${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION }}
      COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
      ACCESS_COOKIE_DOMAIN: ${{ secrets.ACCESS_COOKIE_DOMAIN }}
      REFRESH_COOKIE_DOMAIN: ${{ secrets.REFRESH_COOKIE_DOMAIN }}
      CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine Swarm state
        id: swarm
        run: |
          echo "state=$(docker info --format '{{.Swarm.LocalNodeState}}')" >> $GITHUB_OUTPUT

      - name: Init Swarm if needed
        if: steps.swarm.outputs.state != 'active'
        run: docker swarm init --advertise-addr 127.0.0.1

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images (warm)
        run: |
          docker pull ${WEB_IMAGE} || true
          docker pull ${DASH_IMAGE} || true
          docker pull ${BACKEND_IMAGE} || true

      - name: Run database migrations
        run: docker run --rm -e DATABASE_URL="${DATABASE_URL}" ${BACKEND_IMAGE} npx prisma migrate deploy --config apps/backend/prisma.config.ts

      - name: Remove old stack if exists
        run: docker stack rm crwsync || true

      - name: Ensure network exists
        run: |
          docker network inspect crwsync_net >/dev/null 2>&1 || \
          docker network create --driver overlay --attachable crwsync_net

      - name: Deploy stack
        run: |
          docker stack deploy --with-registry-auth --detach=false -c stack.yml crwsync

      - name: Verify services
        run: docker service ls