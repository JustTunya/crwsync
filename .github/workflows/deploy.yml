name: 🔗 CRWSYNC deployment

permissions:
  contents: read
  packages: write
  id-token: write

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [ self-hosted, linux, x64 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determin current Swarm state
        id: swarm
        run: |
          STATE=$(docker info --format '{{.Swarm.LocalNodeState}}')
          echo "Swarm local node state: $STATE"
          echo "state=$STATE" >> "$GITHUB_OUTPUT"

      - name: Initialize Docker Swarm
        if: steps.swarm.outputs.state != 'active'
        run: |
          echo "Swarm is not active, initializing..."
          docker swarm init --advertise-addr 127.0.0.1

      - name: Login to the registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate repo path
        run: echo "REPOSITORY=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build & push frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          no-cache: true
          tags: ghcr.io/${{ env.REPOSITORY }}/frontend:${{ github.sha }}

      - name: Build & push backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          no-cache: true
          tags: ghcr.io/${{ env.REPOSITORY }}/backend:${{ github.sha }}

      - name: Prepare stack file
        env:
          FRONTEND_IMAGE: ghcr.io/${{ env.REPOSITORY }}/frontend:${{ github.sha }}
          BACKEND_IMAGE: ghcr.io/${{ env.REPOSITORY }}/backend:${{ github.sha }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          VERIFICATION_EXP: ${{ secrets.VERIFICATION_EXP }}
        run: |
          envsubst '${FRONTEND_IMAGE} ${BACKEND_IMAGE} ${DB_HOST} ${DB_PORT} ${DB_USER} ${DB_PASS} ${DB_NAME} ${MAIL_HOST} ${MAIL_PORT} ${MAIL_USER} ${MAIL_PASS} ${VERIFICATION_EXP} ${JWT_SECRET}' < stack.yml.tmp > stack.yml

      - name: Deploy CRWSYNC stack
        run: |
          docker stack deploy --with-registry-auth -c stack.yml crwsync

      - name: Verify docker service
        run: |
          docker service ls