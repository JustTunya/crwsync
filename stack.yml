version: '3.9'

x-deploy-settings: &deploy-settings
  replicas: 1
  update_config:
    parallelism: 1
    delay: 5s
    order: start-first
  rollback_config:
    parallelism: 1
    delay: 5s
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 60s
  resources:
    limits:
      cpus: '0.5'
      memory: 512M
    reservations:
      cpus: '0.25'
      memory: 256M

services:
  database:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    networks:
      - crwsync
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - crwsync_data:/var/lib/postgresql/data
    deploy:
      <<: *deploy-settings
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    image: ${FRONTEND_IMAGE}
    ports:
      - "3000:3000"
    networks:
      - crwsync
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    deploy:
      <<: *deploy-settings
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  backend:
    image: ${BACKEND_IMAGE}
    ports:
      - "8080:8080"
    networks:
      - crwsync
    environment:
      - NODE_ENV=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - JWT_SECRET=${JWT_SECRET}
    deploy:
      <<: *deploy-settings
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  crwsync:
    attachable: true
    driver: overlay

volumes:
  crwsync_data:
    driver: local