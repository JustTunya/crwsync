version: '3.9'

x-deploy-settings: &deploy-settings
  replicas: 1
  update_config:
    parallelism: 1
    delay: 5s
    order: start-first
  rollback_config:
    parallelism: 1
    delay: 5s
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 60s
  resources:
    limits:
      cpus: '0.5'
      memory: 512M
    reservations:
      cpus: '0.25'
      memory: 256M

services:
  web:
    image: ${WEB_IMAGE}
    ports:
      - "3000:3000"
    networks:
      - net
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_DASH_URL=${NEXT_PUBLIC_DASH_URL}
    deploy:
      <<: *deploy-settings
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  dash:
    image: ${DASH_IMAGE}
    ports:
      - "3001:3000"
    networks:
      - net
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WEB_URL=${NEXT_PUBLIC_WEB_URL}
    deploy:
      <<: *deploy-settings
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  backend:
    image: ${BACKEND_IMAGE}
    ports:
      - "8080:8080"
    networks:
      - net
    environment:
      - NODE_ENV=production
      - PORT=8080
      - APP_URL=${NEXT_PUBLIC_WEB_URL}
      - DATABASE_URL=${DATABASE_URL}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - JWT_ACCESS_TOKEN_SECRET=${JWT_ACCESS_TOKEN_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRATION=${JWT_ACCESS_TOKEN_EXPIRATION}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - ACCESS_COOKIE_DOMAIN=${ACCESS_COOKIE_DOMAIN}
      - REFRESH_COOKIE_DOMAIN=${REFRESH_COOKIE_DOMAIN}
      - CORS_ORIGIN=${CORS_ORIGIN}
    deploy:
      <<: *deploy-settings
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  net:
    external: true
    name: crwsync_net

volumes:
  data:
    driver: local
    name: crwsync_data