version: '3.9'

x-deploy-settings: &deploy-settings
  replicas: 2
  update_config:
    parallelism: 2
    delay: 5s
    order: start-first
  rollback_config:
    parallelism: 2
    delay: 5s
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 60s
  resources:
    limits:
      cpus: '0.5'
      memory: 512M
    reservations:
      cpus: '0.25'
      memory: 256M
  placement:
    constraints:
      - node.role == worker
    preferences:
      - spread: node.labels.zone

services:
  frontend:
    image: ${FRONTEND_IMAGE}
    ports:
      - "3000:3000"
    networks:
      - crwsync
    env_file:
      - apps/frontend/.env
    deploy:
      <<: *deploy-settings
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  backend:
    image: ${BACKEND_IMAGE}
    ports:
      - "8080:8080"
    networks:
      - crwsync
    env_file:
      - apps/backend/.env
    deploy:
      <<: *deploy-settings
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  crwsync:
    driver: overlay
    attachable: true
